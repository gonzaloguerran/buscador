<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Consulta Deportistas</title>
    <style>
        :root { --ios-bg: #f2f2f7; --header-bg: #ffffff; --accent-green: #34c759; --accent-blue: #007aff; --error-red: #ff3b30; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--ios-bg); margin: 0; transition: background 0.3s ease; }
        
        /* PANTALLA DE LOGIN */
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--ios-bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; padding: 20px; box-sizing: border-box; }
        .login-card { background: white; padding: 30px 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 320px; text-align: center; }
        .login-card h2 { margin-top: 0; font-size: 22px; font-weight: 600; margin-bottom: 20px; }
        .login-input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #c6c6c8; font-size: 18px; text-align: center; margin-bottom: 15px; box-sizing: border-box; letter-spacing: 2px; }
        .login-btn { background: var(--accent-blue); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .error-msg { color: var(--error-red); font-size: 14px; margin-top: 10px; display: none; }

        /* CONTENIDO DE LA APP (Oculto por defecto) */
        #appContent { display: none; padding-top: 70px; }
        
        /* Barra de búsqueda */
        .sticky-header { position: fixed; top: 0; left: 0; right: 0; padding: 15px; background: var(--header-bg); border-bottom: 0.5px solid #c6c6c8; z-index: 100; }
        .search-input { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #e5e5ea; font-size: 16px; box-sizing: border-box; }
        
        /* Tabla */
        .table-container { overflow-x: auto; padding: 10px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; font-size: 14px; white-space: nowrap; }
        th { background: #f9f9f9; font-weight: 600; color: #8e8e93; }
        
        .match-row { background-color: rgba(52, 199, 89, 0.2); }
    </style>
</head>
<body>

<!-- Pantalla de Barrera / Login -->
<div id="loginScreen">
    <div class="login-card">
        <h2>Acceso Restringido</h2>
        <input type="password" id="pinInput" class="login-input" placeholder="Ingresa el PIN" inputmode="numeric">
        <button id="loginBtn" class="login-btn">Entrar</button>
        <div id="errorMsg" class="error-msg">PIN incorrecto, intenta nuevamente.</div>
    </div>
</div>

<!-- Contenido real de la App -->
<div id="appContent">
    <div class="sticky-header">
        <input type="text" id="searchInput" class="search-input" placeholder="Buscar por nombre o RUT...">
    </div>

    <div class="table-container">
        <table id="resultsTable">
            <thead>
                <tr><th>Nombre</th><th>RUT</th><th>Fecha Nac.</th><th>Previsión</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

    var PIN_CORRECTO = "0000"; // <-- CAMBIA ESTE NÚMERO POR LA CLAVE QUE QUIERAS

    var appContent = document.getElementById('appContent');
    var pinInput = document.getElementById('pinInput');
    var loginBtn = document.getElementById('loginBtn');
    var errorMsg = document.getElementById('errorMsg');

    // Revisar si el usuario ya se había logueado antes en este dispositivo
    if (localStorage.getItem("accesoPermitido") === "true") {
        loginScreen.style.display = "none";
        appContent.style.display = "block";
    }

    // Función para validar el PIN
    function validarAcceso() {
        if (pinInput.value === PIN_CORRECTO) {
            // Guardar el acceso para no volver a pedirlo
            localStorage.setItem("accesoPermitido", "true");
            loginScreen.style.display = "none";
            appContent.style.display = "block";
            errorMsg.style.display = "none";
        } else {
            errorMsg.style.display = "block";
            pinInput.value = "";
        }
    }

    loginBtn.addEventListener('click', validarAcceso);
    pinInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') validarAcceso();
    });

    function parseCSV(text) {
        var lines = text.split('\n');
        var result = [];
        for (var i = 1; i < lines.length; i++) {
            var line = lines[i].trim();
            if (!line) continue;
            
            var cols = line.split(';');
            if (cols.length >= 5) {
                var fechaOriginal = cols[3] ? cols[3].trim() : "Sin registro";
                result.push({
                    nombre: (cols[1] || "").trim(),
                    rut: (cols[2] || "").trim(),
                    fecha: fechaOriginal,
                    prevision: (cols[4] || "").trim()
                });
            }
        }
        return result;
    }

    var dataset = parseCSV(csvData);
    var searchInput = document.getElementById('searchInput');
    var tableBody = document.getElementById('tableBody');

    function normalizeText(str) {
        if (!str) return "";
        var map = {
            'á': 'a', 'é': 'e', 'í': 'i', 'ó': 'o', 'ú': 'u',
            'Á': 'a', 'É': 'e', 'Í': 'i', 'Ó': 'o', 'Ú': 'u',
            'ü': 'u', 'Ü': 'u', 'ñ': 'n', 'Ñ': 'n'
        };
        var res = str.toLowerCase();
        var salida = "";
        for (var i = 0; i < res.length; i++) {
            salida += map[res.charAt(i)] || res.charAt(i);
        }
        return salida;
    }

    searchInput.addEventListener('input', function() {
        var val = normalizeText(searchInput.value);
        var terms = val.split(' ').filter(function(t) { return t.length > 0; });
        
        if (val === "") {
            document.body.style.backgroundColor = 'var(--ios-bg)';
            tableBody.innerHTML = '';
            return;
        }

        var filtered = dataset.filter(function(item) {
            var rowStr = normalizeText(item.nombre + " " + item.rut);
            return terms.every(function(term) {
                return rowStr.indexOf(term) !== -1;
            });
        });

        if (filtered.length === 0) {
            document.body.style.backgroundColor = 'var(--error-red)';
            tableBody.innerHTML = '';
        } else {
            document.body.style.backgroundColor = 'var(--ios-bg)';
            var displayData = filtered.slice(0, 5);
            var html = "";
            
            for (var j = 0; j < displayData.length; j++) {
                var item = displayData[j];
                html += '<tr class="match-row">' +
                        '<td>' + item.nombre + '</td>' +
                        '<td>' + item.rut + '</td>' +
                        '<td>' + item.fecha + '</td>' +
                        '<td>' + item.prevision + '</td>' +
                    '</tr>';
            }
            tableBody.innerHTML = html;
        }
    });
